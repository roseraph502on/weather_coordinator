<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER CODI APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 이미지와 똑같은 감성적인 하늘 배경 세팅 */
        body {
            background: url('https://i.pinimg.com/1200x/5a/01/81/5a0181d2333f4cf6f260253dfcb392df.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
        }
        /* 날씨 블록 유리모프즘(Glassmorphism) 효과 */
        .weather-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 30px 20px;
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .city-name { font-size: 24px; color: #222; margin-bottom: 5px; }
        .temp-display { font-size: 54px; font-weight: 300; color: #111; }
        
        /* 스타일 태그 버튼 스타일 */
        .tag-container { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .style-tag {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        /* 코디 추천 구역 */
        .section-title {
            text-align: center;
            color: #2c444e;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 20px;
        }
        /* 이미지 슬라이더 카드 */
        .outfit-slider-card {
            background: white;
            border-radius: 0px;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .slider-img {
            width: 100%;
            height: auto;
            display: block;
            padding: 40px;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="text-center mb-2">
        <img src="https://static.vecteezy.com/system/resources/previews/024/825/180/non_2x/3d-weather-icon-day-free-png.png" style="width: 140px; height: auto;" alt="Weather Icon">
    </div>

    <div class="weather-container shadow-sm">
        <div class="city-name">{{ city }}</div>
        <div class="temp-display">{{ temp }}°C</div>
        
        <div class="tag-container">
            <span class="style-tag">Lovely</span>
            <span class="style-tag">Office</span>
            <span class="style-tag">Hip</span>
            <span class="style-tag">Casual</span>
        </div>
    </div>

    <div class="max-width: 450px; margin: 20px auto 0; text-center" style="max-width: 450px; margin: 15px auto;">
        <div class="p-3 rounded-4 bg-white bg-opacity-75 text-secondary shadow-sm text-center small fw-medium">
            🤖 AI 요약: "{{ ai_briefing }}"
        </div>
    </div>

    <h2 class="section-title">RECOMENDED CODINATION</h2>

    <div id="outfitCarousel" class="carousel slide outfit-slider-card shadow" data-bs-ride="carousel">
        <div class="carousel-inner">
            {% for outfit in outfits %}
            <div class="carousel-item {% if forloop.first %}active{% endif %}">
                <img src="{{ outfit.image }}" class="slider-img" alt="{{ outfit.title }}">
                <div class="p-3 text-center bg-light border-top">
                    <p class="m-0 text-truncate text-muted small fw-bold">{{ outfit.title }}</p>
                </div>
            </div>
            {% empty %}
            <div class="carousel-item active p-5 text-center text-muted">
                추천 의상 이미지를 파싱 중입니다.
            </div>
            {% endfor %}
        </div>
        
        <button class="carousel-control-prev" type="button" data-bs-target="#outfitCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon bg-dark rounded-circle p-2" aria-hidden="true" style="filter: invert(1);"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#outfitCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon bg-dark rounded-circle p-2" aria-hidden="true" style="filter: invert(1);"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const hasLat = urlParams.has('lat');
    const hasLon = urlParams.has('lon');
    const hasCity = urlParams.has('city');

    if (!hasLat && !hasLon && !hasCity) {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    // 위경도를 물고 장고 내부 매핑 주소로 새로고침
                    window.location.href = `/?lat=${lat}&lon=${lon}`;
                },
                (error) => {
                    console.log("위치 조회 실패, 기본 서울 처리", error);
                }
            );
        }
    }
</script>
</body>
</html>
